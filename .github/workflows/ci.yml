name: CI - Identity API

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore src/Backend/EsperancaSolidaria.Identity.API/EsperancaSolidaria.Identity.API.csproj

      - name: Build
        run: dotnet build src/Backend/EsperancaSolidaria.Identity.API/EsperancaSolidaria.Identity.API.csproj -c Release --no-restore

      - name: Build Docker Image
        run: docker build -t identity-api:${{ github.sha }} .